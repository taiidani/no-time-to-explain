[env]
_.file = ".env"

# OpenTelemetry tracing.
# Traces are exported via OTLP to a collector/agent (e.g. Grafana Alloy) that
# forwards them to a centralized backend such as Tempo. The exporter and its
# destination are configured entirely through these standard OTEL_* variables.
#
# For local development we print spans to the console. Set OTEL_TRACES_EXPORTER
# to "otlp" (and OTEL_EXPORTER_OTLP_ENDPOINT to your agent) to ship them, or
# "none" to disable tracing entirely.
OTEL_SERVICE_NAME = "no-time-to-explain"
OTEL_TRACES_EXPORTER = "console"
OTEL_TRACES_SAMPLER = "parentbased_always_on"
OTEL_RESOURCE_ATTRIBUTES = "deployment.environment=dev"
# OTEL_EXPORTER_OTLP_ENDPOINT = "http://localhost:4317"
# OTEL_EXPORTER_OTLP_PROTOCOL = "grpc"
PORT = "3000"
URL = "http://localhost:3000"
DEV = "true"

# bot-testing: https://discord.com/channels/372591705754566656/907725266648973353
BLUESKY_FEED_CHANNEL_ID = "907725266648973353"

REDIS_HOST = "localhost"
REDIS_PORT = 6379

DATABASE_URL = "postgresql://postgres:root@127.0.0.1:5432/postgres"
GOOSE_DRIVER = "postgres"
GOOSE_DBSTRING = "postgresql://postgres:root@127.0.0.1:5432/postgres"
GOOSE_MIGRATION_DIR = "./internal/db/migrations"

[tools]
go = "1"
staticcheck = "latest"
vault = "latest"

[tasks.default]
description = "Execute the app in development mode"
depends = ["build", "docker"]
run = ["./no-time-to-explain"]

[tasks.build]
description = "Build the server binary"
env.CGO_ENABLED = "0"
depends = ["test", "lint"]
run = ["go build -o no-time-to-explain main.go"]

[tasks.env]
description = "Generate environment variables"
outputs = [".env"]
run = ["vault kv get -field=env credentials/dev/no-time-to-explain > .env"]

[tasks.docker]
run = ["docker compose up -d --wait"]

[tasks.seed]
description = "Populate the database with seeds"
env.GOOSE_MIGRATION_DIR = "./internal/db/seeds"
run = ["go tool goose --no-versioning up"]

[tasks.test]
description = "Run the unit test suite"
env.CGO_ENABLED = 1                                    # Required for -race
run = ["go test -race -covermode=atomic -cover ./..."]

[tasks.integration_test]
description = "Run the integration test suite"
run = ["go test --tags='integration' ./..."]

[tasks.refresh]
description = "Refresh the backend data"
depends = ["docker", "build"]
run = ["./no-time-to-explain refresh"]

[tasks.lint]
run = ["go vet ./...", "staticcheck ./..."]
